<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFRI_MentorLink - Recherche de mentor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">IFRI_MentorLink</h1>
        <p class="text-muted">Trouvez un mentor compatible avec vos besoins, sans inscription.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm p-4 mb-4">
                <form id="searchForm">
                    <div class="mb-3">
                        <label class="form-label">Matières / compétences recherchées</label>
                        <input type="text" class="form-control" id="matieres"
                               placeholder="ex: Python, Bases de données" required>
                        <div class="form-text">Séparez plusieurs matières par une virgule.</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Jour souhaité</label>
                            <select class="form-select" id="jour" required>
                                <option value="">-- Choisir un jour --</option>
                                <option value="lundi">Lundi</option>
                                <option value="mardi">Mardi</option>
                                <option value="mercredi">Mercredi</option>
                                <option value="jeudi">Jeudi</option>
                                <option value="vendredi">Vendredi</option>
                                <option value="samedi">Samedi</option>
                                <option value="dimanche">Dimanche</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Heure souhaitée</label>
                            <input type="time" class="form-control" id="heure" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Filière (optionnel)</label>
                        <input type="text" class="form-control" id="filiere" placeholder="ex: IA, GL, SI">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Rechercher</button>
                </form>
            </div>

            <div id="resultsContainer"></div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
